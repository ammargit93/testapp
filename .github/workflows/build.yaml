name: Build Kivy APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout repo
      uses: actions/checkout@v3

    - name: 🐍 Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 🧰 Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          build-essential \
          git zip unzip \
          openjdk-17-jdk \
          python3-pip \
          libncurses5 \
          libstdc++6 \
          libffi-dev \
          libssl-dev \
          pkg-config \
          libgl1-mesa-dev \
          libgles2-mesa-dev \
          libsqlite3-dev \
          zlib1g-dev

    - name: 📦 Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install buildozer cython

    - name: ⚙️ Initialize Buildozer if needed
      run: |
        if [ ! -f buildozer.spec ]; then
          buildozer init
        fi

    - name: 🏗️ Build APK
      run: |
        buildozer android debug

    - name: 📤 Upload APK artifact
      uses: actions/upload-artifact@v3
      with:
        name: kivy-apk
        path: bin/*.apk
